name: Discord Release Notification

on:
  release:
    types: [published, edited]

jobs:
  notify:
    # Skip when release body is empty (race: electron-builder publishes first,
    # then release.js patches title+body via GitHub API which fires 'edited').
    # We only notify once the body is actually set.
    if: github.event.release.body != ''
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "🚀 Новый релиз BG3 ULTIMA — $RELEASE_TAG" \
            --arg thread "🚀 BG3 ULTIMA $RELEASE_TAG" \
            --arg url "$RELEASE_URL" \
            --arg desc "$RELEASE_BODY" \
            --arg tag "$RELEASE_TAG" \
            --arg ts "$RELEASE_DATE" \
            '{
              thread_name: $thread,
              embeds: [{
                title: $title,
                url: $url,
                color: 5793266,
                fields: [
                  { name: "📦 Версия", value: $tag, inline: true },
                  { name: "👤 Автор",  value: "ANICKON", inline: true },
                  { name: "🔗 Скачать", value: ("[GitHub Releases](" + $url + ")"), inline: true },
                  { name: "📋 Что нового", value: (if ($desc | length) > 1020 then $desc[:1020] + "..." else (if ($desc | length) == 0 then "_Нет описания._" else $desc end) end) }
                ],
                footer: { text: "BG3 ULTIMA • GitHub Releases" },
                timestamp: $ts
              }]
            }')
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Send announcement
        env:
          DISCORD_ANNOUNCE_WEBHOOK: ${{ secrets.DISCORD_ANNOUNCE_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASES_CHANNEL: ${{ secrets.DISCORD_RELEASES_CHANNEL_URL }}
        run: |
          PAYLOAD=$(jq -n \
            --arg tag "$RELEASE_TAG" \
            --arg channel "$RELEASES_CHANNEL" \
            '{
              content: ("@everyone\n\n🚀 **Вышла новая версия BG3 ULTIMA " + $tag + "!**\nСкачать можно в канале релизов: " + $channel)
            }')
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$DISCORD_ANNOUNCE_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Response: $RESPONSE"
